name: Build

on:
  push:
    branches: main
  pull_request:
    branches: '*'

permissions: {}

jobs:
  check_linting:
    name: Lint check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Conda environment with Micromamba
        uses: mamba-org/setup-micromamba@add3a49764cedee8ee24e82dfde87f5bc2914462 # v2
        with:
          environment-name: gis
          create-args: >-
            python=3.12
            jupyterlab=4

      - name: Install dependencies
        shell: bash -l {0}
        run: jlpm install

      - name: Lint
        id: eslint
        continue-on-error: true
        shell: bash -l {0}
        run: jlpm run eslint:check

      - name: Check formatting
        id: prettier
        continue-on-error: true
        shell: bash -l {0}
        run: jlpm run prettier:check

      - name: Report
        shell: bash -l {0}
        run: |
          failed=0

          if [ "${{ steps.eslint.outcome }}" != "success" ]; then
            echo "❌ ESLint check failed"
            failed=1
          fi

          if [ "${{ steps.prettier.outcome }}" != "success" ]; then
            echo "❌ Prettier format check failed"
            failed=1
          fi

          exit $failed
