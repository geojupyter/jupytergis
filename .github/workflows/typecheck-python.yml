name: 'Typecheck Python'

on:
  push:
    branches: 'main'
  pull_request:
    branches: '*'

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}'
  cancel-in-progress: true

permissions: {}

jobs:
  mypy:
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0' # v7.0.0
        with:
          persist-credentials: false

      - name: 'Install Conda environment with Micromamba'
        uses: 'mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476' # v3.0.0
        with:
          cache-environment: true
          environment-name: 'gis'
          create-args: >-
            python=3.13
            pip
            qgis

      - name: 'Setup pip cache'
        uses: 'actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae' # v5
        with:
          path: '~/.cache/pip'
          key: pip-${{ hashFiles('package.json') }}
          restore-keys: |
            pip-

      - name: 'Install build dependencies'
        shell: 'bash -l {0}'
        run: 'pip install --group build'

      - name: 'Get yarn cache directory path'
        id: 'yarn-cache-dir-path'
        shell: 'bash -l {0}'
        run: |
          set -e
          CACHE_DIR="$(jlpm config get cacheFolder)"
          echo "dir=${CACHE_DIR}" >> $GITHUB_OUTPUT

      - name: 'Setup yarn cache'
        uses: 'actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae' # v5
        id: 'yarn-cache' # use this to check for `cache-hit` (`steps.yarn-cache.outputs.cache-hit != 'true'`)
        with:
          path: '${{ steps.yarn-cache-dir-path.outputs.dir }}'
          key: "yarn-${{ hashFiles('yarn.lock') }}"
          restore-keys: |
            yarn-

      - name: 'Install'
        shell: 'bash -l {0}'
        run: 'python scripts/dev-install.py'

      # NOTE: Requires JavaScript build to generate Python types!
      - name: 'Run mypy for jupytergis packages'
        shell: 'bash -l {0}'
        run: 'mypy'

      - name: 'Install the latest version of uv'
        uses: 'astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39' # v8.2.0
        with:
          enable-cache: true

      - name: 'Run mypy for layer_gallery'
        working-directory: './scripts/layer_gallery'
        run: 'uv run --group dev mypy'
