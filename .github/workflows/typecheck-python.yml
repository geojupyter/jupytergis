name: 'Typecheck Python'

on:
  push:
    branches: 'main'
  pull_request:
    branches: '*'

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}'
  cancel-in-progress: true

permissions: {}

jobs:
  mypy:
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2
        with:
          persist-credentials: false

      - name: 'Setup pnpm'
        uses: 'pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061' # v4.2.0
        with:
          cache: true

      - name: 'Install Conda environment with Micromamba'
        uses: 'mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476' # v3.0.0
        with:
          cache-environment: true
          environment-name: 'gis'
          create-args: >-
            python=3.13
            pip
            qgis

      - name: 'Setup pip cache'
        uses: 'actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae' # v5
        with:
          path: '~/.cache/pip'
          key: pip-${{ hashFiles('package.json') }}
          restore-keys: |
            pip-

      - name: 'Install build dependencies'
        shell: 'bash -l {0}'
        run: 'pip install --group build'

      - name: 'Install'
        shell: 'bash -l {0}'
        run: 'python scripts/dev-install.py'

      # NOTE: Requires JavaScript build to generate Python types!
      - name: 'Run mypy for jupytergis packages'
        shell: 'bash -l {0}'
        run: 'mypy'

      - name: 'Install the latest version of uv'
        uses: 'astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b' # v8.1.0
        with:
          enable-cache: true

      - name: 'Run mypy for layer_gallery'
        working-directory: './scripts/layer_gallery'
        run: 'uv run --group dev mypy'
