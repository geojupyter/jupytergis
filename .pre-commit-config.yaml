ci:
  # pre-commit.ci will open PRs updating our hooks once a month
  autoupdate_schedule: quarterly
  autofix_prs: false

exclude: '.*\.jgis$'
repos:
  # Autoformat and linting, misc. details
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: forbid-new-submodules
      - id: end-of-file-fixer
        exclude: galata/.*-snapshots
      - id: check-case-conflict
      - id: requirements-txt-fixer
      - id: check-added-large-files
        args: ['--maxkb=5000']
      - id: check-case-conflict
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: check-builtin-literals
      - id: trailing-whitespace
        exclude: .bumpversion.cfg

  # Autoformat & lint: Python code
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: ['--fix', '--show-fixes', '--exit-non-zero-on-fix']
      - id: ruff-format

  - repo: https://github.com/rstcheck/rstcheck
    rev: v6.2.5
    hooks:
      - id: rstcheck
        args: ['--ignore-directives=jupyterlite,tabs,toctree,autoclass,cssclass,include', '--report-level=warning']

  # Validate citation metadata
  - repo: https://github.com/citation-file-format/cffconvert
    rev: "b6045d78aac9e02b039703b030588d54d53262ac"
    hooks:
      - id: validate-cff

  # Strip output cells from notebooks
  - repo: https://github.com/kynan/nbstripout
    rev: 0.5.0
    hooks:
      - id: nbstripout
