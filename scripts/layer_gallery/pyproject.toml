[project]
name = "layer-gallery"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2",
    "xyzservices",
    "requests",
    "pillow",
    "mercantile",
]

[project.optional-dependencies]
dev = [
    "pytest",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
